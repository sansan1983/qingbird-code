# qingbird-code V0.1.0 deepseek-only 测试配置
#
# 关键设计：deepseek 不可达（localhost:9999）—— smoke test 只验证
# CLI 契约，不验证 LLM 调用。

core:
  language: en-US
  timezone: UTC

llm:
  deepseek:
    api_key: "test-mock-key-not-real"
    default_model: "deepseek-chat"
    base_url: "http://localhost:9999"
    timeout_secs: 5
    max_retries: 0
    retry_backoff_ms: 100
  cache:
    l1_enabled: true
    l2_enabled: false
    l2_ttl_days: 7

memory:
  working_memory_limit: 100
  project_db_path: "./tests/fixtures/data/test_project.db"
  user_db_path: "./tests/fixtures/data/test_user.db"
  cleanup_interval_hours: 24

security:
  risk_threshold: L0
  allowed_paths: []

profiles:
  default: test
  available:
    - test
