id: opencode-go
display_name: "OpenCode Go"
protocol: openai_compatible
base_url: "https://opencode.ai/zen/go/v1"
api_key: "${OPENCODE_GO_API_KEY}"
default_model: "glm-5.1"
list_models:
  # OpenCode Go 同一 base URL 不同 endpoint
  - id: "glm-5.1"
    endpoint: "/v1/chat/completions"
  - id: "glm-5"
    endpoint: "/v1/chat/completions"
  - id: "kimi-k2.7"
    endpoint: "/v1/chat/completions"
  - id: "kimi-k2.6"
    endpoint: "/v1/chat/completions"
  - id: "deepseek-v4-pro"
    endpoint: "/v1/chat/completions"
  - id: "deepseek-v4-flash"
    endpoint: "/v1/chat/completions"
  - id: "mimo-v2.5"
    endpoint: "/v1/chat/completions"
  - id: "mimo-v2.5-pro"
    endpoint: "/v1/chat/completions"
  - id: "minimax-m3"
    endpoint: "/v1/messages"
  - id: "minimax-m2.7"
    endpoint: "/v1/messages"
  - id: "minimax-m2.5"
    endpoint: "/v1/messages"
  - id: "qwen3.7-max"
    endpoint: "/v1/messages"
  - id: "qwen3.7-plus"
    endpoint: "/v1/messages"
  - id: "qwen3.6-plus"
    endpoint: "/v1/messages"
list_models_endpoint: "/v1/models"
